<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sphere Platformer</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="info">
      <div><b>Sphere Platformer</b></div>
      <div>← / → &nbsp; orbit camera</div>
      <div>↑ / ↓ &nbsp; move forward / back</div>
      <div>Space &nbsp; jump</div>
      <div>R &nbsp; reset</div>
    </div>
    <div id="win">
      <h1>YOU MADE IT!</h1>
      <p>Press R to play again</p>
    </div>
    <div id="dead">
      <h1>YOU DIED</h1>
      <p>Press R to try again</p>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
